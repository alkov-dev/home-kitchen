version: '3.8'

services:
  # PostgreSQL для Auth сервиса
  postgres-auth:
    image: postgres:15-alpine
    container_name: hk-postgres-auth
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-auth-data:/var/lib/postgresql/data
    networks:
      - home-kitchen-network

  # Redis для кэширования и сессий
  redis:
    image: redis:7-alpine
    container_name: hk-redis
    ports:
      - "6379:6379"
    networks:
      - home-kitchen-network

  # RabbitMQ (пока не используем, но подготовим)
  rabbitmq:
    image: rabbitmq:3-management
    container_name: hk-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    networks:
      - home-kitchen-network

volumes:
  postgres-auth-data:

networks:
  home-kitchen-network:
    driver: bridge